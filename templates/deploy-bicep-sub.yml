parameters:
  - name: azureServiceConnection
    type: string
  - name: deploymentName
    type: string
  - name: location
    type: string
  - name: templateFile
    type: string
  - name: parameterFile
    type: string
  - name: noWait
    type: string
    default: "true"
  - name: deploymentNameSuffix
    type: string
    default: "$(Build.BuildId)"

steps:
  - task: AzureCLI@2
    displayName: Deploy Bicep (Subscription level)
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        DEPLOYMENT="${{ parameters.deploymentName }}"
        if [[ -n "${{ parameters.deploymentNameSuffix }}" ]]; then
          DEPLOYMENT="${DEPLOYMENT}-${{ parameters.deploymentNameSuffix }}"
        fi
        NO_WAIT_ARG=""
        if [[ "${{ parameters.noWait }}" == "true" ]]; then
          NO_WAIT_ARG="--no-wait"
        fi

        echo -e "Starting deployment: $DEPLOYMENT"

        az deployment sub create \
          --name "$DEPLOYMENT" \
          --location "${{ parameters.location }}" \
          --template-file "${{ parameters.templateFile }}" \
          --parameters "${{ parameters.parameterFile }}" \
          $NO_WAIT_ARG

        bash $(System.DefaultWorkingDirectory)/scripts/monitor-bicep-deployment.sh sub "" "$DEPLOYMENT"
